<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <meta name="google-site-verification" content="ua6_q4Tq_knYYu7sIAJFPGEzsgsPLlSxSIKqJyCv22M" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHAT IF EARTH? | Premium Earth Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: var(--font-main); 
            overflow: hidden; 
            height: 100vh;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; outline: none; }

        /* --- UI ELEMENTS (TINY BUTTONS) --- */
        .tiny-btn {
            position: fixed;
            z-index: 100;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            font-family: var(--font-main);
            padding: 5px 10px;
            border-radius: 3px;
        }
        .tiny-btn:hover {
            color: var(--accent);
            border-color: rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }
        #btn-support { top: 15px; left: 15px; }
        #btn-bug { bottom: 15px; right: 15px; }

        /* BUG MODAL */
        #bug-modal {
            display: none;
            position: fixed;
            bottom: 45px;
            right: 15px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 15px;
            z-index: 101;
            border-radius: 5px;
            width: 250px;
        }
        #bug-modal p { font-size: 0.6rem; color: #888; margin-bottom: 10px; letter-spacing: 1px;}
        #bug-modal textarea {
            width: 100%; height: 80px;
            background: #000; color: #fff;
            border: 1px solid #333;
            font-family: var(--font-main);
            font-size: 0.75rem;
            padding: 8px; resize: none; margin-bottom: 10px;
            border-radius: 3px; outline: none;
        }
        #bug-modal textarea:focus { border-color: var(--accent); }
        .modal-btns { display: flex; gap: 10px; }

        /* --- STAGE 1: LOBBY --- */
        #lobby {
            position: absolute;
            z-index: 10;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            background: radial-gradient(circle at center, transparent, #000 90%);
            padding: 80px 20px;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s ease;
        }

        header { text-align: center; margin-bottom: 60px; pointer-events: none; }
        h1 { 
            font-size: clamp(2rem, 8vw, 4rem); 
            font-weight: 200; 
            letter-spacing: 15px; 
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 0.9rem; letter-spacing: 5px; color: var(--accent); opacity: 0.8; margin-top: 10px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
        }

        .card h3 { font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: #fff; }
        .card p { font-size: 0.8rem; color: #888; line-height: 1.5; }

        /* --- STAGE 2: SIMULATION --- */
        #sim-ui {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .sim-active #lobby { opacity: 0; transform: scale(0.90) translateY(-20px); pointer-events: none; filter: blur(10px); }
        .sim-active #sim-ui { opacity: 1; pointer-events: auto; }

        .top-bar { padding: 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .sim-info { text-align: center; flex: 1; margin: 0 40px; }
        .sim-info h2 { font-size: 2rem; font-weight: 200; letter-spacing: 8px; text-transform: uppercase; color: var(--accent); }
        .sim-info p { font-size: 0.9rem; color: #ccc; margin-top: 10px; }

        .btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 24px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            border-radius: 4px;
        }
        .btn:hover { background: #fff; color: #000; }

        /* NEW LAYOUT FOR PANELS TO AVOID OVERLAP */
        .bottom-panel {
            position: absolute;
            bottom: 40px;
            right: 40px; /* Moved to bottom right */
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 20px 30px;
            display: flex;
            gap: 40px; /* Space between stats */
            border-radius: 8px;
        }

        .stat { text-align: center; }
        .stat label { display: block; font-size: 0.6rem; color: #888; letter-spacing: 2px; margin-bottom: 5px; }
        .stat span { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .timeline {
            position: absolute;
            left: 40px;
            top: 50%; /* Center vertically on the left */
            transform: translateY(-50%);
            border-left: 2px solid var(--border);
            padding-left: 20px;
        }
        .time-step { margin-bottom: 25px; }
        .time-step span { font-size: 0.65rem; color: var(--accent); display: block; font-weight: 700; letter-spacing: 1px; }
        .time-step p { font-size: 0.85rem; color: #ddd; max-width: 250px; margin-top: 5px; line-height: 1.4; }

        /* LOADING */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem; letter-spacing: 5px; color: var(--accent);
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <div id="loader">INITIALIZING SIMULATION ENGINE...</div>

    <button id="btn-support" class="tiny-btn" onclick="addSupport()">♥ SUPPORT (0)</button>
    
    <button id="btn-bug" class="tiny-btn" onclick="toggleBugModal(true)">REPORT BUG</button>
    <div id="bug-modal">
        <p>REPORT AN ISSUE (ENGLISH ONLY)</p>
        <form id="bug-form" onsubmit="submitBug(event)">
            <textarea id="bug-text" placeholder="Describe what went wrong..." required pattern="^[a-zA-Z0-9\s.,!?\'\-]+$"></textarea>
            <div class="modal-btns">
                <button type="submit" class="btn" style="padding: 6px 12px; font-size: 0.6rem;">SEND</button>
                <button type="button" class="btn" onclick="toggleBugModal(false)" style="padding: 6px 12px; font-size: 0.6rem; background: transparent;">CANCEL</button>
            </div>
        </form>
    </div>

    <div id="lobby">
        <header>
            <h1>What If Earth?</h1>
            <div class="subtitle">PLANETARY ALTERNATE REALITY SIMULATOR</div>
        </header>
        <div class="grid" id="card-grid"></div>
    </div>

    <div id="sim-ui">
        <div class="top-bar">
            <button class="btn" onclick="exitSim()">← Lobby</button>
            <div class="sim-info">
                <h2 id="sim-title">SCENARIO</h2>
                <p id="sim-desc">Description of the alternate reality.</p>
            </div>
            <button class="btn" onclick="resetSim()">Reset Params</button>
        </div>

        <div class="timeline" id="timeline">
            <div class="time-step"><span>IMMEDIATE EFFECT</span><p id="t1">-</p></div>
            <div class="time-step"><span>AFTER 24 HOURS</span><p id="t2">-</p></div>
            <div class="time-step"><span>LONG TERM (1 YEAR)</span><p id="t3">-</p></div>
        </div>

        <div class="bottom-panel">
            <div class="stat"><label>TEMP</label><span id="s-temp">15°C</span></div>
            <div class="stat"><label>GRAVITY</label><span id="s-grav">1.0G</span></div>
            <div class="stat"><label>WATER</label><span id="s-water">71%</span></div>
            <div class="stat"><label>SURVIVAL</label><span id="s-surv">100%</span></div>
        </div>
    </div>

    <script>
        /** DATA SET - Scenarios **/
        const scenarios = [
            { id:1, title: "Twice as Fast", desc: "Day/Night cycle is now 12 hours.", color: 0xffffff, speed: 4, t:["Violent wind patterns start", "Extreme tidal bulges flood coasts", "Global jetstream destabilization"], stats:["22", "0.9", "71", "60"] },
            { id:2, title: "No Sun", desc: "Earth drifts into deep space.", color: 0x000033, speed: 0.5, t:["Total darkness falls instantly", "Global surface freeze begins", "Atmosphere collapses into snow"], stats:["-270", "1.0", "100", "0"] },
            { id:3, title: "Gravity x2", desc: "Planetary mass doubled.", color: 0xffffff, speed: 0.5, t:["Everyone feels incredibly heavy", "Weak structures collapse immediately", "Trees and mountains begin to crumble"], stats:["35", "2.0", "75", "5"] },
            { id:4, title: "No Oceans", desc: "All water instantly vanishes.", color: 0xaa8866, speed: 0.5, t:["Massive oceanic basins exposed", "Global firestorms due to dry air", "Total oxygen cycle collapse"], stats:["85", "1.0", "0", "0"] },
            { id:5, title: "Snowball Earth", desc: "Total albedo reflection. A frozen world.", color: 0xe0f7fa, speed: 0.5, t:["Equator temperatures drop to 0°C", "Global glaciation covers oceans", "Photosynthesis stops entirely"], stats:["-50", "1.0", "100", "10"] },
            { id:6, title: "Binary Star", desc: "Earth gets a second, orange sun.", color: 0xffccaa, speed: 0.5, t:["Double shadows appear", "No real night cycle", "Extreme UV radiation bakes surface"], stats:["55", "1.0", "40", "30"] },
            { id:7, title: "Vulcan Era", desc: "Total tectonic instability.", color: 0xff3300, speed: 1.5, t:["Supervolcanoes erupt globally", "Ash cloud veils the sky completely", "Sulfuric acid rain oceans"], stats:["90", "1.0", "30", "0"] },
            { id:8, title: "No Atmosphere", desc: "The void reaches the surface.", color: 0x000000, speed: 0.5, t:["Instant boiling of surface fluids", "Total silence (sound needs air)", "Lethal cosmic radiation hits ground"], stats:["-18", "1.0", "0", "0"] },
            { id:9, title: "Sea Level +100m", desc: "The great flood returns.", color: 0x0055ff, speed: 0.5, t:["Major coastal cities submerged", "Archipelago world formed", "Global ocean currents radically shift"], stats:["24", "1.0", "95", "80"] },
            { id:10, title: "Backwards Orbit", desc: "Venus-like retrograde rotation.", color: 0xccffcc, speed: -1, t:["Sun sets in the East", "Wind systems violently reverse", "Sahara turns green, Amazon turns desert"], stats:["15", "1.0", "71", "95"] },
            { id:11, title: "Tidally Locked", desc: "One side always faces the sun.", color: 0xffffff, speed: 0, t:["Rotation stops, one side burns", "Permanent hurricane at the terminator line", "Dark side freezes solid"], stats:["100 / -100", "1.0", "35", "15"] },
            { id:12, title: "Earth's Rings", desc: "A shattered moon forms a ring system.", color: 0xffffff, speed: 0.5, t:["Spectacular ring shadow on equator", "Constant meteor showers", "Nights become unnaturally bright"], stats:["14", "1.0", "71", "85"] },
            { id:13, title: "Kessler Syndrome", desc: "Millions of debris pieces trap us.", color: 0x555555, speed: 0.5, t:["All satellites destroyed in chain reaction", "GPS and global internet fails", "Space travel becomes impossible"], stats:["15", "1.0", "71", "90"] },
            { id:14, title: "Glass Earth", desc: "The crust becomes transparent.", color: 0xffaaaa, speed: 0.5, t:["Sunlight hits the inner mantle", "Blinding glow from the planetary core", "Biological clocks destroyed by constant light"], stats:["40", "1.0", "71", "0"] },
            { id:15, title: "Donut Earth", desc: "Toroidal planet physics.", color: 0xffffff, speed: 1.0, t:["Gravity pulls sideways in some zones", "Seasons become wildly erratic", "Moons orbit through the center hole"], stats:["15", "0.3-0.6", "65", "40"] },
            { id:16, title: "Flat Earth", desc: "The ultimate conspiracy is true.", color: 0xffffff, speed: 0.3, t:["Gravity pulls diagonally near edges", "Cats push everything off the rim", "Ice wall becomes a tourist hotspot"], stats:["15", "1.0", "71", "50"] },
            { id:17, title: "Minecraft Earth", desc: "Blocky physics take over.", color: 0xffffff, speed: 0.5, t:["Trees float when chopped", "Creepers spawn in dark zones", "Digging straight down is fatal"], stats:["20", "1.0", "70", "42"] },
            { id:18, title: "Breathing Earth", desc: "The planet expands and contracts.", color: 0xffffff, speed: 1.0, t:["Earthquakes are just hiccups", "Atmosphere gets pushed in and out", "Tides become incredibly chaotic"], stats:["20", "0.5-1.5", "71", "30"] },
            
            // --- NEW SCENARIOS ---
            { id:19, title: "Jupiter Mass", desc: "Earth becomes a super-massive gas giant.", color: 0xffaa55, speed: 1.5, t:["You instantly weigh 300x more", "Atmospheric pressure crushes everything", "Diamonds begin to rain from the sky"], stats:["150", "2.5", "10", "0"] },
            { id:20, title: "Cyberpunk Earth", desc: "A planet-wide glowing mega-city.", color: 0xff00ff, speed: 0.8, t:["Oceans replaced by glowing data streams", "Pollution reaches critical levels globally", "Flying cars and neon fill the sky"], stats:["35", "1.0", "0", "85"] },
            { id:21, title: "Cheese Earth", desc: "The planet is literally made of cheese.", color: 0xffcc00, speed: 0.5, t:["A delicious smell fills the air", "Mice population explodes rapidly", "Oceans slowly turn into warm fondue"], stats:["25", "0.8", "0", "99"] }
        ];

        /** ENGINE GLOBALS **/
        let scene, camera, renderer, globe, clouds, atmosphere, starfield, sun, sun2, nightGlobe;
        let globeMat, earthTex, bumpTex, specTex;
        
        // Special Meshes
        let sphereGeo, donutGeo, flatGeo, boxGeo;
        let ringMesh, debrisMesh, coreMesh;
        let isSim = false;
        let breathingTween = null;
        let controls;

        const textureLoader = new THREE.TextureLoader();
        const textures = {
            day: 'https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg',
            bump: 'https://raw.githubusercontent.com/turban/webgl-earth/master/images/elev_bump_4k.jpg',
            spec: 'https://raw.githubusercontent.com/turban/webgl-earth/master/images/water_4k.png',
            clouds: 'https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png',
            lights: 'https://stemkoski.github.io/Three.js/images/earth-night.jpg'
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // Preload Textures
            earthTex = textureLoader.load(textures.day);
            bumpTex = textureLoader.load(textures.bump);
            specTex = textureLoader.load(textures.spec);

            // 1. Globe Geometries
            sphereGeo = new THREE.SphereGeometry(1, 128, 128);
            donutGeo = new THREE.TorusGeometry(1.2, 0.4, 64, 128);
            flatGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64);
            boxGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);

            globeMat = new THREE.MeshStandardMaterial({
                map: earthTex, bumpMap: bumpTex, bumpScale: 0.015,
                roughnessMap: specTex, roughness: 0.6, metalness: 0.1
            });
            globe = new THREE.Mesh(sphereGeo, globeMat);
            scene.add(globe);

            // SUN 
            sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 3, 5);
            scene.add(sun);

            // --- SMART NIGHT LIGHTS (Custom Shader) ---
            const nightShader = {
                uniforms: {
                    nightTex: { value: textureLoader.load(textures.lights) },
                    sunPosition: { value: sun.position },
                    opacity: { value: 1.0 },
                    cyberMode: { value: 0.0 } // 1 for Cyberpunk, 0 for normal
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D nightTex;
                    uniform vec3 sunPosition;
                    uniform float opacity;
                    uniform float cyberMode;
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vec3 sunDir = normalize(sunPosition);
                        float intensity = dot(vNormal, sunDir);
                        float nightMix = smoothstep(0.1, -0.2, intensity);
                        
                        // If cyberMode is 1, lights are visible everywhere (ignore sun)
                        nightMix = mix(nightMix, 1.0, cyberMode);
                        
                        vec4 texColor = texture2D(nightTex, vUv);
                        
                        // If cyberMode is 1, make lights neon pink/cyan. Otherwise orange/yellow.
                        vec3 lightColor = mix(vec3(1.2, 1.0, 0.7), vec3(2.0, 0.2, 1.5), cyberMode);
                        
                        gl_FragColor = vec4(texColor.rgb * lightColor * nightMix * opacity, texColor.a * nightMix * opacity);
                    }
                `
            };
            const nightMat = new THREE.ShaderMaterial({
                uniforms: nightShader.uniforms,
                vertexShader: nightShader.vertexShader,
                fragmentShader: nightShader.fragmentShader,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            nightGlobe = new THREE.Mesh(new THREE.SphereGeometry(1.002, 128, 128), nightMat);
            globe.add(nightGlobe);

            // 2. Clouds
            const cloudGeo = new THREE.SphereGeometry(1.015, 128, 128);
            const cloudMat = new THREE.MeshStandardMaterial({
                map: textureLoader.load(textures.clouds),
                transparent: true, opacity: 0.8,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            clouds = new THREE.Mesh(cloudGeo, cloudMat);
            globe.add(clouds);

            // 3. Atmosphere
            const atmosGeo = new THREE.SphereGeometry(1.2, 128, 128);
            const atmosMat = new THREE.ShaderMaterial({
                vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `varying vec3 vNormal; void main() { float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0); gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity; }`,
                side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
            });
            atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
            scene.add(atmosphere);

            // SPECIAL MESHES
            ringMesh = new THREE.Mesh(new THREE.RingGeometry(1.4, 2.4, 128), new THREE.MeshStandardMaterial({ map: textureLoader.load(textures.clouds), side: THREE.DoubleSide, transparent: true, opacity: 0.7 }));
            ringMesh.rotation.x = Math.PI / 2; ringMesh.visible = false; scene.add(ringMesh);

            const debrisGeo = new THREE.BufferGeometry();
            const debCoords = [];
            for(let i=0; i<3000; i++) {
                let r = 1.05 + Math.random() * 0.2, theta = Math.random() * 2 * Math.PI, phi = Math.acos(2 * Math.random() - 1);
                debCoords.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            }
            debrisGeo.setAttribute('position', new THREE.Float32BufferAttribute(debCoords, 3));
            debrisMesh = new THREE.Points(debrisGeo, new THREE.PointsMaterial({color: 0xff5533, size: 0.015}));
            debrisMesh.visible = false; scene.add(debrisMesh);

            coreMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 64, 64), new THREE.MeshBasicMaterial({ color: 0xff3300 }));
            coreMesh.visible = false; scene.add(coreMesh);

            scene.add(new THREE.AmbientLight(0xffffff, 0.05));
            sun2 = new THREE.DirectionalLight(0xff6600, 0);
            sun2.position.set(-5, -2, 4);
            scene.add(sun2);

            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<8000; i++) { starCoords.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150); }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            starfield = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xaaaaaa, size: 0.05}));
            scene.add(starfield);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.minDistance = 1.5; controls.maxDistance = 10;
            controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 1000);
            }, 1500);

            initUI();
            animate();
            createGrid();
        }

        // --- UI LOGIC ---
        function initUI() {
            let likes = localStorage.getItem('earth_likes') || 0;
            document.getElementById('btn-support').innerText = `♥ SUPPORT (${likes})`;
        }

        // --- FIXED SUPPORT LOGIC ---
        function addSupport() {
            // בודק אם המשתמש כבר עשה לייק אי פעם
            if(localStorage.getItem('earth_has_voted') === 'true') {
                alert("You already supported this site! Thank you! ♥");
                return;
            }

            let likes = parseInt(localStorage.getItem('earth_likes') || 0) + 1;
            localStorage.setItem('earth_likes', likes);
            localStorage.setItem('earth_has_voted', 'true'); // חותמת שהמשתמש הצביע

            document.getElementById('btn-support').innerText = `♥ SUPPORT (${likes})`;
            
            // Little animation
            gsap.fromTo("#btn-support", { scale: 1.5, color: "#ff0055" }, { scale: 1, color: "rgba(255,255,255,0.4)", duration: 0.5 });
        }

        function toggleBugModal(show) {
            const modal = document.getElementById('bug-modal');
            if(show) {
                modal.style.display = 'block';
                gsap.fromTo(modal, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3 });
            } else {
                gsap.to(modal, { y: 20, opacity: 0, duration: 0.3, onComplete: () => modal.style.display = 'none' });
            }
        }

        function submitBug(e) {
            e.preventDefault();
            const text = document.getElementById('bug-text').value;
            
            if(!/^[a-zA-Z0-9\s.,!?\'\-]+$/.test(text)) {
                alert("Please use English letters only.");
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "SENDING...";
            
            fetch('https://formspree.io/f/xvzvdnvd', {
                method: 'POST',
                body: JSON.stringify({ message: text }),
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    alert("Bug reported successfully! The developer will check it out.");
                    document.getElementById('bug-text').value = '';
                    toggleBugModal(false);
                } else {
                    alert("Oops! There was a problem sending the report.");
                }
                btn.innerText = "SEND";
            }).catch(error => {
                alert("Network error, please try again.");
                btn.innerText = "SEND";
            });
        }

        function createGrid() {
            const grid = document.getElementById('card-grid');
            scenarios.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;
                div.onclick = () => enterSim(s);
                grid.appendChild(div);
            });
        }

        function enterSim(s) {
            isSim = true;
            document.body.classList.add('sim-active');
            
            document.getElementById('sim-title').innerText = s.title;
            document.getElementById('sim-desc').innerText = s.desc;
            document.getElementById('t1').innerText = s.t[0];
            document.getElementById('t2').innerText = s.t[1];
            document.getElementById('t3').innerText = s.t[2];
            document.getElementById('s-temp').innerText = s.stats[0] + "°C";
            document.getElementById('s-grav').innerText = s.stats[1] + "G";
            document.getElementById('s-water').innerText = s.stats[2] + "%";
            document.getElementById('s-surv').innerText = s.stats[3] + "%";

            resetVisuals();

            // CINEMATIC SWOOP CAMERA
            let targetZ = 2.8;
            if(s.id === 15 || s.id === 16) targetZ = 3.5; 
            if(s.id === 19) targetZ = 4.0; // Zoom further out for Jupiter
            
            gsap.fromTo(camera.position, 
                { x: 3, y: 2 }, 
                { x: 0, y: 0, z: targetZ, duration: 2.5, ease: "power3.inOut" }
            );

            controls.autoRotate = true;
            gsap.to(controls, { autoRotateSpeed: s.speed, duration: 2 });

            switch(s.id) {
                case 2: // No Sun
                    gsap.to(sun, { intensity: 0, duration: 2 });
                    atmosphere.visible = false;
                    nightGlobe.material.uniforms.opacity.value = 0.5;
                    nightGlobe.material.uniforms.sunPosition.value = new THREE.Vector3(0,0,0);
                    break;
                case 3: // Gravity x2
                    gsap.to(globe.scale, { y: 0.85, duration: 2 });
                    break;
                case 4: // No Oceans
                    globeMat.map = null;
                    gsap.to(globeMat.color, { r: 0.5, g: 0.3, b: 0.1, duration: 1 });
                    globeMat.roughness = 1.0; globeMat.needsUpdate = true;
                    clouds.visible = false; nightGlobe.visible = false;
                    break;
                case 5: // Snowball
                    globeMat.map = null;
                    gsap.to(globeMat.color, { r: 0.9, g: 0.95, b: 1.0, duration: 1 });
                    globeMat.roughness = 0.2; globeMat.needsUpdate = true;
                    nightGlobe.visible = false;
                    break;
                case 6: // Binary Star
                    gsap.to(sun2, { intensity: 2.5, duration: 2 });
                    nightGlobe.visible = false; 
                    break;
                case 7: // Vulcan
                    globeMat.map = null;
                    gsap.to(globeMat.color, { r: 0.2, g: 0.0, b: 0.0, duration: 1 });
                    globeMat.emissive.setHex(0xff2200); globeMat.needsUpdate = true;
                    clouds.material.color.setHex(0x444444);
                    nightGlobe.visible = false;
                    break;
                case 8: // No Atmos
                    clouds.visible = false; atmosphere.visible = false;
                    sun.intensity = 3.5;
                    break;
                case 9: // Sea Level
                    globeMat.map = null;
                    gsap.to(globeMat.color, { r: 0.1, g: 0.3, b: 0.8, duration: 1 });
                    globeMat.roughness = 0.1; globeMat.needsUpdate = true;
                    break;
                case 11: // Tidally Locked
                    controls.autoRotate = false; sun.intensity = 4;
                    break;
                case 12: // Rings
                    ringMesh.visible = true;
                    break;
                case 13: // Kessler
                    debrisMesh.visible = true; nightGlobe.visible = false;
                    break;
                case 14: // Glass Earth
                    globeMat.transparent = true;
                    gsap.to(globeMat, { opacity: 0.2, duration: 2 });
                    coreMesh.visible = true; nightGlobe.visible = false;
                    break;
                case 15: // Donut
                    globe.geometry = donutGeo; atmosphere.visible = false; clouds.visible = false; nightGlobe.visible = false;
                    break;
                case 16: // Flat
                    globe.geometry = flatGeo; atmosphere.visible = false; clouds.visible = false; nightGlobe.visible = false;
                    break;
                case 17: // Minecraft
                    globe.geometry = boxGeo; atmosphere.visible = false; clouds.visible = false; nightGlobe.visible = false;
                    break;
                case 18: // Breathing
                    breathingTween = gsap.to(globe.scale, { x: 1.1, y: 1.1, z: 1.1, duration: 1.5, yoyo: true, repeat: -1, ease: "sine.inOut" });
                    break;
                case 19: // Jupiter Mass
                    gsap.to(globe.scale, { x: 1.3, y: 1.3, z: 1.3, duration: 2 });
                    globeMat.map = null;
                    gsap.to(globeMat.color, { r: 0.8, g: 0.5, b: 0.2, duration: 1 });
                    clouds.material.color.setHex(0xffaa55);
                    clouds.scale.set(1.1, 1.1, 1.1);
                    break;
                case 20: // Cyberpunk
                    globeMat.map = null;
                    globeMat.color.setHex(0x111111);
                    globeMat.wireframe = true;
                    nightGlobe.material.uniforms.cyberMode.value = 1.0; // Turn on neon mode
                    atmosphere.material.fragmentShader = `varying vec3 vNormal; void main() { float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0); gl_FragColor = vec4(1.0, 0.0, 1.0, 1.0) * intensity; }`;
                    atmosphere.material.needsUpdate = true;
                    break;
                case 21: // Cheese
                    globeMat.map = null;
                    globeMat.color.setHex(0xffcc00);
                    globeMat.roughness = 1.0; globeMat.metalness = 0.0;
                    globeMat.bumpScale = 0.05; // Extra bumpy
                    clouds.visible = false; nightGlobe.visible = false;
                    break;
            }
        }

        function resetVisuals() {
            if(breathingTween) { breathingTween.kill(); breathingTween = null; }
            
            globe.geometry = sphereGeo;
            globe.scale.set(1, 1, 1);
            clouds.scale.set(1, 1, 1);
            
            globeMat.map = earthTex;
            globeMat.color.setHex(0xffffff);
            globeMat.emissive.setHex(0x000000);
            globeMat.roughness = 0.6;
            globeMat.metalness = 0.1;
            globeMat.bumpScale = 0.015;
            globeMat.transparent = false;
            globeMat.opacity = 1.0;
            globeMat.wireframe = false;
            globeMat.needsUpdate = true;

            clouds.material.color.setHex(0xffffff);
            clouds.visible = true;
            
            atmosphere.visible = true;
            atmosphere.material.fragmentShader = `varying vec3 vNormal; void main() { float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0); gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity; }`;
            atmosphere.material.needsUpdate = true;

            nightGlobe.visible = true;
            nightGlobe.material.uniforms.opacity.value = 1.0;
            nightGlobe.material.uniforms.cyberMode.value = 0.0;
            nightGlobe.material.uniforms.sunPosition.value = sun.position;
            
            sun.intensity = 2.5;
            sun2.intensity = 0;

            ringMesh.visible = false;
            debrisMesh.visible = false;
            coreMesh.visible = false;
        }

        function resetSim() {
            resetVisuals();
            controls.autoRotate = true;
            gsap.to(controls, { autoRotateSpeed: 0.5, duration: 1 });
        }

        function exitSim() {
            isSim = false;
            document.body.classList.remove('sim-active');
            
            gsap.to(camera.position, { x: 0, y: 0, z: 6, duration: 2, ease: "power2.inOut" });
            resetSim();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            
            if(clouds) clouds.rotation.y += 0.0003 * (isSim ? controls.autoRotateSpeed : 1);
            
            if(debrisMesh && debrisMesh.visible) {
                debrisMesh.rotation.y += 0.002;
                debrisMesh.rotation.z += 0.001;
            }
            if(ringMesh && ringMesh.visible) {
                ringMesh.rotation.z += 0.001;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
